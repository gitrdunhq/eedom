name: GATEKEEPER — Dependency & Code Review

on:
  pull_request:
    paths:
      # Python
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"
      - "Pipfile*"
      # JavaScript/TypeScript
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      # Rust
      - "Cargo.toml"
      - "Cargo.lock"
      # Go
      - "go.mod"
      - "go.sum"
      # Ruby
      - "Gemfile"
      - "Gemfile.lock"
      # .NET
      - "*.csproj"
      - "packages.config"
      - "Directory.Packages.props"
      # Dart/Flutter
      - "pubspec.yaml"
      - "pubspec.lock"
      # PHP
      - "composer.json"
      - "composer.lock"
      # Elixir
      - "mix.exs"
      - "mix.lock"
      # Source code (for Semgrep)
      - "**/*.py"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.go"
      - "**/*.rs"
      - "**/*.java"
      - "**/*.rb"

  workflow_dispatch:
    inputs:
      enforcement_mode:
        description: "Enforcement mode (block, warn, log)"
        required: false
        default: "warn"
        type: choice
        options:
          - block
          - warn
          - log

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  gatekeeper:
    name: GATEKEEPER Review
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Generate PR diff
        id: diff
        run: |
          mkdir -p .temp
          git diff "$BASE_SHA"..."$HEAD_SHA" > .temp/pr.diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Run eedom review
        run: uv run eedom review --repo-path . --all --format sarif --output .temp/review.sarif

      - name: Post results
        if: always()
        run: |
          uv run eedom review --repo-path . --all --output .temp/review.md || true
          if [ -s .temp/review.md ]; then
            MARKER="<!-- eedom-review -->"
            BODY="${MARKER}
          $(cat .temp/review.md)"
            EXISTING=$(unset GITHUB_TOKEN && gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
              --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1)
            if [ -n "$EXISTING" ]; then
              unset GITHUB_TOKEN && gh api "repos/${REPO}/issues/comments/${EXISTING}" \
                --method PATCH --field body="$BODY" > /dev/null
            else
              unset GITHUB_TOKEN && gh pr comment "$PR_NUM" --body "$BODY"
            fi
          fi
        env:
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
